server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://candy-api:8069/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /avatar/ {
        proxy_pass http://candy-api:8069/avatar/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /output/ {
        proxy_pass http://candy-api:8069/output/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
